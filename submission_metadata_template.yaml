ai_usage_summary: |
  Used a combination of AI tools throughout development. Gemini Deep Research
  for initial architecture research and literature review. Claude Sonnet for
  first-iteration code inspection, ONNX INT8 quantization implementation and
  debugging, and iterative improvement of the full pipeline. Kimi 2.6 for
  architecture decisions and cross-validation of approaches. DeepSeek for
  the majority of technical discussions, code review, and pipeline design
  decisions. GitHub Copilot for routine bug fixes and code completion.
  All AI tools were used as engineering aids — architecture decisions,
  debugging, and design tradeoffs were driven by human judgment throughout.
  No premium subscriptions used.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid BM25 + semantic retrieval (nomic-embed-text-v1.5) fused via
  Reciprocal Rank Fusion retrieves 2,000 candidates from 100K. A
  mxbai-rerank-xsmall-v1 cross-encoder quantized to INT8 via raw
  torch.onnx export and onnxruntime.quantization (bypassing optimum)
  reranks the top 500 on CPU in under 3 minutes using under 1.8GB RAM
  with zero network calls. Pre-filtering reduces 100K to 5-8K survivors
  via honeypot detection (impossible skill durations, timeline
  contradictions, fictional companies), hard filters (YoE, location),
  and JD template analysis (44 unique templates discovered, 82K
  irrelevant candidates dropped). Structured signal scoring applies
  dataset-calibrated multipliers: YoE fit, notice period, location,
  GitHub activity, career quality (FAANG +1.35x, consulting 0.85x),
  skill depth (advanced skills verified >=12 months, rare skills
  weighted higher), and recruiter market signals. Final score combines
  ce_score x structured_multiplier. Reasoning is non-templated: role
  with YoE, template summary, top differentiator, and honest friction
  where present. Ranking step runs in under 3 minutes on CPU, uses
  under the given RAM Constraint, and makes zero network calls.

